name: CI

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/ci.yaml"
      - "go/**"
      - "node/**"
      - "java/**"
      - "python/**"
      - "csharp/**"
      - "proto/**"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/ci.yaml"
      - "go/**"
      - "node/**"
      - "java/**"
      - "python/**"
      - "csharp/**"
      - "proto/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.actor != 't-0-ci[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: go/go.sum

      - name: Validate Go module state
        working-directory: go
        run: |
          go mod tidy
          git diff --exit-code || (echo "go.mod diff found, please run 'go mod tidy'" && false)

      - name: Run Tests
        working-directory: go
        run: go test -v ./...

  node:
    name: Node
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.actor != 't-0-ci[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: node/sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: node/sdk
        run: npm ci

      - name: Build SDK
        working-directory: node/sdk
        run: npm run build

      - name: Run SDK Tests
        working-directory: node/sdk
        run: npm test

      # Type-check the starter template against the freshly built SDK.
      # The template ships to providers as a scaffolded project; without
      # this guard, schema/API drift between the SDK and the template is
      # only caught when a provider runs `npm run build` for the first
      # time. We pack the local SDK and overlay it on top of the
      # template's normal `npm install` (which fetches the published SDK
      # from the registry) so we type-check against unreleased changes too.
      - name: Pack SDK for template type-check
        working-directory: node/sdk
        run: npm pack

      - name: Install starter template dependencies
        # `npm install` (not `npm ci`) because the template's package-lock.json
        # is not strict-locked to the latest SDK — providers regenerate it on
        # first install. We just need a working install for type checking.
        working-directory: node/starter/template
        run: npm install --no-audit --no-fund

      - name: Overlay local SDK build into template
        working-directory: node/starter/template
        run: npm install --no-save --no-audit --no-fund ../../sdk/t-0-provider-sdk-*.tgz

      - name: Type-check starter template against local SDK
        working-directory: node/starter/template
        run: npx tsc --noEmit -p tsconfig.typecheck.json

  java:
    name: Java
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.actor != 't-0-ci[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build and test
        working-directory: java
        run: |
          chmod +x gradlew
          ./gradlew build -x distTar -x distZip --no-daemon

  python:
    name: Python
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.actor != 't-0-ci[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install dependencies
        working-directory: python
        run: uv sync --all-packages

      - name: Lint
        working-directory: python
        run: uv run ruff check .

      # TODO: re-enable once type errors are fixed
      # - name: Type check
      #   working-directory: python
      #   run: uv run mypy .

      - name: Run tests
        working-directory: python
        run: uv run pytest

  csharp:
    name: C#
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.actor != 't-0-ci[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        working-directory: csharp
        run: dotnet build

      - name: Test
        working-directory: csharp
        run: dotnet test --no-build
