# TODO: All publish steps are currently dry-run for debugging the release process.
#   To revert to real publishing:
#   1. Node SDK/Starter: remove `--dry-run` from `npm publish` commands
#   2. Python SDK/Starter: restore `uv publish --trusted-publishing always dist/...` commands
#   3. Java: restore `./gradlew publishAggregationToCentralPortal` and JAR upload steps
#   4. Go: restore `GOPROXY=proxy.golang.org go list -m ...` command
#   5. Uncomment the verify-jitpack job at the bottom
name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  # --- Build gate (all must pass before any publishing) ---
  build-go:
    name: Build Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: go/go.sum

      - name: Build
        working-directory: go
        run: go build ./...

  build-node:
    name: Build Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build SDK
        working-directory: node/sdk
        run: |
          npm ci
          npm run build

      - name: Build Starter
        working-directory: node/starter
        run: |
          npm ci
          npm run build

  build-java:
    name: Build Java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        working-directory: java
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

  build-python:
    name: Build Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        working-directory: python
        run: |
          uv sync
          uv build --package t0-provider-sdk
          uv build --package t0-provider-starter

  # --- Publish (only after ALL builds pass) ---
  publish-go:
    name: Publish Go
    needs: [build-go, build-node, build-java, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: go/go.sum

      - name: Request GOPROXY update (dry run)
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "[DRY RUN] Would run: GOPROXY=proxy.golang.org go list -m github.com/t-0-network/provider-sdk/go@v${VERSION}"

  publish-node-sdk:
    name: Publish Node SDK
    needs: [build-go, build-node, build-java, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build
        working-directory: node/sdk
        run: |
          npm ci
          npm run build

      - name: Publish (dry run)
        working-directory: node/sdk
        run: npm publish --provenance --access public --dry-run

  publish-node-starter:
    name: Publish Node Starter
    needs: [build-go, build-node, build-java, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build
        working-directory: node/starter
        run: |
          npm ci
          npm run build

      - name: Publish (dry run)
        working-directory: node/starter
        run: npm publish --provenance --access public --dry-run

  publish-python-sdk:
    name: Publish Python SDK
    needs: [build-go, build-node, build-java, build-python]
    runs-on: ubuntu-latest
    environment: pypi-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        working-directory: python
        run: uv build --package t0-provider-sdk

      - name: Publish (dry run)
        working-directory: python
        run: |
          echo "[DRY RUN] Would publish: dist/t0_provider_sdk-*"
          ls -la dist/t0_provider_sdk-*

  publish-python-starter:
    name: Publish Python Starter
    needs: [build-go, build-node, build-java, build-python]
    runs-on: ubuntu-latest
    environment: pypi-starter
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        working-directory: python
        run: uv build --package t0-provider-starter

      - name: Publish (dry run)
        working-directory: python
        run: |
          echo "[DRY RUN] Would publish: dist/t0_provider_starter-*"
          ls -la dist/t0_provider_starter-*

  publish-java:
    name: Publish Java
    needs: [build-go, build-node, build-java, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        working-directory: java
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Publish to Maven Central (dry run)
        working-directory: java
        run: |
          echo "[DRY RUN] Would run: ./gradlew publishAggregationToCentralPortal"
          echo "[DRY RUN] Would upload provider-init.jar to GitHub Release"
          ls -la cli/build/libs/provider-init-*.jar

